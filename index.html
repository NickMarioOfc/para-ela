<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensagem Para Você ❤️</title>

<style>
    body{
        background: linear-gradient(135deg, #ff8fb1, #ff5e8a);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
        text-align: center;
    }

    h1{
        font-size: 2rem;
        margin-bottom: 20px;
    }

    #texto{
        font-size: 1.5rem;
        background: rgba(255,255,255,0.15);
        padding: 20px;
        border-radius: 20px;
        backdrop-filter: blur(5px);
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .heart{
        position: absolute;
        color: white;
        animation: subir 5s linear infinite;
        font-size: 20px;
    }

    @keyframes subir{
        0%{
            transform: translateY(100vh);
            opacity: 0;
        }
        100%{
            transform: translateY(-10vh);
            opacity: 1;
        }
    }
</style>
</head>
<body>

<h1>❤️ Uma mensagem pra você ❤️</h1>

<div id="texto">
    Carregando amor infinito...
</div>

<script>
let contador = 1;
const texto = document.getElementById("texto");

function atualizar(){
    texto.innerHTML =
    `"Quando eu olho para você, eu amo você ${contador} vezes mais ❤️"`;

    contador++;

    if(contador > 1000){
        contador = 1;
    }
}

setInterval(atualizar, 100);

// corações subindo
function criarCoracao(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(criarCoracao, 300);
</script>

</body>
</html>
